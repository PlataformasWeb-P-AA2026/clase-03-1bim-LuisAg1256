<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Demo Jquery</title>
    <script src="https://code.jquery.com/jquery-3.5.0.js"></script>
  </head>
  <body>
      <h1>Listado de Instituciones</h1>
      
      <button type="submit" id="obtenerInformacion">Obtener información</button>
      <button type="submit" id="limpiarInformacion">Limpiar información</button>
      
      <div id="mensajeFinal">
      </div>
  </body>
  <script>
    $(document).ready(function() {
      var url = "data_instituciones.json";
      
      $( "#obtenerInformacion" ).click(function() {
            $.ajax({
              dataType: 'json',
              url: url 
            }).then(function(data) {
              $('#mensajeFinal').empty();
              for(var i=0; i<data.length; i++){
                $('#mensajeFinal').append(
                    "<p>" + 
                        "Nombre: " + data[i]["Nombre-Educativa"] + " - " +
                        "AMIE: " + data[i].AMIE + " - " +
                        "Parroquia: " + data[i].Parroquia + 
                    "</p>"
                );
              }
            });      
      });
      
      $( "#limpiarInformacion" ).click(function() {
          $('#mensajeFinal').empty();
      });
    });
  </script>
</html>
